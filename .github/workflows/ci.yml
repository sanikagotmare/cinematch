name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi pydantic pydantic-settings loguru httpx pytest pytest-asyncio

      - name: Write test .env
        run: |
          cat > .env << 'EOF'
          APP_NAME=CineMatch API
          DEBUG=true
          TMDB_API_KEY=test_key
          TMDB_REGION=IN
          CHROMA_PERSIST_DIR=.chromadb_test
          MOVIES_CSV=data/tmdb_5000_movies.csv
          CREDITS_CSV=data/tmdb_5000_credits.csv
          CACHE_TTL_SECONDS=60
          EOF

      - name: Run cache unit tests
        run: |
          python -c "
          from app.core.cache import TTLCache
          import time
          cache = TTLCache(ttl=1)
          cache.set('k', 'v')
          assert cache.get('k') == 'v'
          time.sleep(1.1)
          assert cache.get('k') is None
          print('Cache tests passed.')
          "

      - name: Run schema validation tests
        run: |
          python -c "
          from app.schemas.movie import MovieRecommendation
          from pydantic import ValidationError
          m = MovieRecommendation(
              movie_id=1, title='Test', overview='desc',
              genres=['Action'], vote_average=7.5,
              release_year='2020', similarity_score=0.92
          )
          assert m.title == 'Test'
          try:
              MovieRecommendation(
                  movie_id=1, title='Bad', overview='x',
                  genres=[], vote_average=11.0,
                  release_year='2020', similarity_score=0.5
              )
              assert False
          except ValidationError:
              pass
          print('Schema tests passed.')
          "

      - name: Run config tests
        run: |
          python -c "
          from app.core.config import get_settings
          s = get_settings()
          assert s.APP_NAME == 'CineMatch API'
          assert s.DEFAULT_TOP_K == 5
          print('Config tests passed.')
          "

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Dockerfile exists
        run: test -f Dockerfile && echo "Dockerfile found" || exit 1

      - name: Verify docker-compose exists
        run: test -f docker-compose.yml && echo "docker-compose.yml found" || exit 1

      - name: Validate Dockerfile syntax
        run: |
          docker build --check . || echo "Docker build check done"