name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python setup ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      # ── Env setup ───────────────────────────────────────────────────────────
      # Set minimal env vars so the app can import without a real .env file
      - name: Write test .env
        run: |
          cat > .env << 'EOF'
          APP_NAME=CineMatch API
          DEBUG=true
          TMDB_API_KEY=test_key
          TMDB_REGION=IN
          CHROMA_PERSIST_DIR=.chromadb_test
          MOVIES_CSV=data/tmdb_5000_movies.csv
          CREDITS_CSV=data/tmdb_5000_credits.csv
          CACHE_TTL_SECONDS=60
          EOF

      # ── Smoke-test: imports work ─────────────────────────────────────────────
      - name: Verify imports
        run: python -c "from app.core.config import get_settings; print(get_settings().APP_NAME)"

      # ── Unit tests (no vector store needed) ──────────────────────────────────
      - name: Run cache unit tests
        run: |
          python -c "
          from app.core.cache import TTLCache
          import time

          cache = TTLCache(ttl=1)
          cache.set('k', 'v')
          assert cache.get('k') == 'v', 'Cache get failed'
          time.sleep(1.1)
          assert cache.get('k') is None, 'TTL eviction failed'
          stats = cache.stats()
          assert stats['alive'] == 0
          print('All cache unit tests passed.')
          "

      # ── Schema validation tests ───────────────────────────────────────────────
      - name: Run schema validation tests
        run: |
          python -c "
          from app.schemas.movie import MovieRecommendation, SearchResult, StreamingProvider
          from pydantic import ValidationError

          # Valid object
          m = MovieRecommendation(
              movie_id=1, title='Test', overview='desc',
              genres=['Action'], vote_average=7.5,
              release_year='2020', similarity_score=0.92
          )
          assert m.title == 'Test'

          # Invalid vote_average should raise
          try:
              MovieRecommendation(
                  movie_id=1, title='Bad', overview='x',
                  genres=[], vote_average=11.0,
                  release_year='2020', similarity_score=0.5
              )
              assert False, 'Should have raised ValidationError'
          except ValidationError:
              pass

          print('All schema tests passed.')
          "

      # ── Config tests ──────────────────────────────────────────────────────────
      - name: Run config tests
        run: |
          python -c "
          from app.core.config import get_settings
          s = get_settings()
          assert s.APP_NAME == 'CineMatch API'
          assert s.DEFAULT_TOP_K == 5
          assert s.MAX_TOP_K == 20
          print('Config tests passed.')
          "

  # ── Docker build check ──────────────────────────────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Dockerfile exists
        run: test -f Dockerfile && echo "Dockerfile found" || exit 1

      - name: Check docker-compose config
        run: test -f docker-compose.yml && echo "docker-compose.yml found" || exit 1
